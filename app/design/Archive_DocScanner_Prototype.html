<style>
/* Old Money Document Scanner — Design System */

:root {
  --bg-primary: #F7F4EF;
  --bg-secondary: #EFEBE3;
  --bg-tertiary: #E8E2D6;
  --surface: #FDFBF8;
  --surface-raised: #FFFFFF;
  --text-primary: #1C1917;
  --text-secondary: #6B6560;
  --text-tertiary: #A09890;
  --accent: #8B7355;
  --accent-light: #C4A882;
  --accent-subtle: #F0E8DC;
  --success: #4A7C59;
  --danger: #8B3A3A;
  --warning: #8B6914;
  --overlay: rgba(28, 25, 23, 0.6);
  --camera-bg: #0F0D0B;

  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --radius-xl: 28px;

  --shadow-sm: 0 1px 3px rgba(28,25,23,0.08), 0 1px 2px rgba(28,25,23,0.04);
  --shadow-md: 0 4px 12px rgba(28,25,23,0.10), 0 2px 4px rgba(28,25,23,0.06);
  --shadow-lg: 0 12px 32px rgba(28,25,23,0.14), 0 4px 8px rgba(28,25,23,0.08);

  --display: "Cormorant Garamond", "Times New Roman", serif;
  --body: "DM Sans", -apple-system, system-ui, sans-serif;
  --mono: "DM Mono", "SF Mono", ui-monospace, monospace;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0; padding: 0;
  font-family: var(--body);
  color: var(--text-primary);
  background: #2B2824;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* === stage with subtle warm gradient === */
.stage {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px 80px;
  background:
    radial-gradient(ellipse at 30% 20%, #4A4239 0%, transparent 55%),
    radial-gradient(ellipse at 70% 80%, #3A342D 0%, transparent 55%),
    #2B2824;
}

/* === Phone frame === */
.phone {
  position: relative;
  width: 390px;
  height: 844px;
  background: #0a0a0a;
  border-radius: 54px;
  padding: 10px;
  box-shadow:
    0 0 0 2px #222 inset,
    0 40px 80px rgba(0,0,0,0.5),
    0 10px 30px rgba(0,0,0,0.4);
  flex-shrink: 0;
}
.phone-screen {
  position: relative;
  width: 100%;
  height: 100%;
  border-radius: 44px;
  overflow: hidden;
  background: var(--bg-primary);
}
.phone-notch {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 32px;
  background: #000;
  border-radius: 20px;
  z-index: 100;
}

/* === Status bar === */
.statusbar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 54px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 0 32px 10px;
  font-family: var(--body);
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  z-index: 50;
  pointer-events: none;
}
.statusbar.dark { color: #fff; }
.statusbar .icons { display: flex; gap: 6px; align-items: center; }

/* === Home indicator === */
.home-indicator {
  position: absolute;
  bottom: 8px; left: 50%;
  transform: translateX(-50%);
  width: 134px; height: 5px;
  background: var(--text-primary);
  border-radius: 3px;
  opacity: 0.35;
  z-index: 60;
}
.home-indicator.light { background: #fff; opacity: 0.6; }

/* === Screen container === */
.screen {
  position: absolute;
  inset: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  background: var(--bg-primary);
}
.screen-content {
  flex: 1;
  overflow-y: auto;
  padding-top: 54px;
  scrollbar-width: none;
}
.screen-content::-webkit-scrollbar { display: none; }

/* typography utilities */
.display { font-family: var(--display); letter-spacing: 0.01em; }
.mono { font-family: var(--mono); }
.caps { text-transform: uppercase; letter-spacing: 0.12em; }

/* buttons */
.btn {
  font-family: var(--body);
  font-weight: 500;
  font-size: 15px;
  letter-spacing: 0.02em;
  padding: 14px 24px;
  border-radius: var(--radius-md);
  border: none;
  cursor: pointer;
  transition: transform 100ms ease, background 150ms ease, opacity 150ms ease;
  font-feature-settings: "ss01";
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:active { background: #7a6449; }
.btn-secondary {
  background: transparent;
  border: 1.5px solid var(--accent);
  color: var(--accent);
}
.btn-ghost { background: transparent; color: var(--text-secondary); }

/* chip */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: var(--accent-subtle);
  color: var(--accent);
  border-radius: var(--radius-sm);
  font-family: var(--body);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 150ms ease;
  border: none;
}
.chip.selected { background: var(--accent); color: #fff; }

/* card */
.card {
  background: var(--surface-raised);
  border: 1px solid var(--bg-tertiary);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  transition: transform 100ms ease, box-shadow 100ms ease;
}
.card:active { transform: scale(0.98); box-shadow: none; }

/* paper grain overlay */
.paper-grain {
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(139,115,85,0.02) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(139,115,85,0.015) 0%, transparent 50%);
  background-size: 240px 240px, 300px 300px;
  opacity: 0.6;
  pointer-events: none;
  mix-blend-mode: multiply;
}

/* animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}
@keyframes shimmer {
  0% { stroke-dashoffset: 0; }
  100% { stroke-dashoffset: -24; }
}
@keyframes flash {
  0% { opacity: 0; }
  50% { opacity: 1; }
  100% { opacity: 0; }
}
@keyframes scannerSweep {
  0% { transform: translateY(-100%); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(100%); opacity: 0; }
}

.fade-in { animation: fadeIn 400ms ease-out both; }

/* toast */
.toast {
  position: absolute;
  left: 20px; right: 20px;
  bottom: 100px;
  background: var(--text-primary);
  color: var(--bg-primary);
  padding: 14px 18px;
  border-radius: var(--radius-md);
  font-size: 14px;
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  gap: 12px;
  animation: fadeIn 250ms ease-out both;
  z-index: 200;
}

/* scroll snap */
.snap-x {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scrollbar-width: none;
  gap: 12px;
}
.snap-x::-webkit-scrollbar { display: none; }
.snap-x > * { scroll-snap-align: start; flex-shrink: 0; }

/* bottom sheet backdrop */
.sheet-backdrop {
  position: absolute;
  inset: 0;
  background: var(--overlay);
  z-index: 150;
  animation: fadeIn 200ms ease-out both;
}
.bottom-sheet {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  background: var(--surface);
  border-top-left-radius: var(--radius-lg);
  border-top-right-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  z-index: 151;
  animation: slideUp 300ms cubic-bezier(0.22, 1, 0.36, 1) both;
  padding: 8px 0 28px;
  max-height: 85%;
  overflow-y: auto;
}
.sheet-handle {
  width: 40px; height: 4px;
  background: var(--bg-tertiary);
  border-radius: 2px;
  margin: 8px auto 16px;
}

/* document thumbnail — stripe placeholder */
.doc-thumb {
  background: var(--bg-secondary);
  position: relative;
  overflow: hidden;
  border-radius: var(--radius-sm);
  border: 1px solid var(--bg-tertiary);
}
.doc-thumb::before {
  content: "";
  position: absolute;
  inset: 8px 10px;
  background:
    repeating-linear-gradient(
      transparent 0px,
      transparent 4px,
      rgba(139,115,85,0.18) 4px,
      rgba(139,115,85,0.18) 5px,
      transparent 5px,
      transparent 10px
    );
}

/* page flip hint */
.page-curl {
  position: absolute;
  bottom: 0; right: 0;
  width: 30px; height: 30px;
  background: linear-gradient(225deg, var(--bg-secondary) 50%, transparent 50%);
  border-top: 1px solid var(--bg-tertiary);
  border-left: 1px solid var(--bg-tertiary);
}

/* progress bar */
.progress-thin {
  position: absolute;
  top: 54px; left: 0; right: 0;
  height: 2px;
  background: transparent;
  overflow: hidden;
  z-index: 40;
}
.progress-thin .bar {
  height: 100%;
  background: var(--accent);
  transition: width 300ms ease;
}

</style>
</head>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>

}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

});

function CameraOverlay({ detected }) {
  const color = detected ? 'var(--accent-light)' : '#fff';
  const size = 260, height = 340;
  const armLen = 28;

  const Corner = ({ style, d }) => (
    <svg width={armLen+4} height={armLen+4} style={{ position: 'absolute', ...style }}>
      <path d={d} stroke={color} strokeWidth={stroke} strokeLinecap="round" fill="none"
        strokeDasharray={detected ? '0' : '4 4'}
        style={{ filter: detected ? `drop-shadow(0 0 6px ${color})` : 'none',
          transition: 'all 200ms' }}/>
    </svg>
  );
  const cx = 195 - size/2; // phone width 390/2 - box/2
  const cy = 422 - height/2;
  return (
    <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', zIndex: 10 }}>
      {/* Corner markers */}
      <Corner style={{ left: `calc(50% - ${size/2 + 2}px)`, top: `calc(50% - ${height/2 + 2}px)` }}
        d={`M2 ${armLen} L2 2 L${armLen} 2`}/>
      <Corner style={{ right: `calc(50% - ${size/2 + 2}px)`, top: `calc(50% - ${height/2 + 2}px)` }}
        d={`M${armLen+2} ${armLen} L${armLen+2} 2 L2 2`}/>
      <Corner style={{ left: `calc(50% - ${size/2 + 2}px)`, bottom: `calc(50% - ${height/2 + 2}px)` }}
        d={`M2 2 L2 ${armLen+2} L${armLen} ${armLen+2}`}/>
      <Corner style={{ right: `calc(50% - ${size/2 + 2}px)`, bottom: `calc(50% - ${height/2 + 2}px)` }}
        d={`M${armLen+2} 2 L${armLen+2} ${armLen+2} L2 ${armLen+2}`}/>

      {/* Connecting rectangle when detected */}
      {detected && (
        <div style={{
          position: 'absolute',
          left: `calc(50% - ${size/2}px)`, top: `calc(50% - ${height/2}px)`,
          width: size, height: height,

        }}/>
      )}
    </div>
  );
}

/* ========== app.jsx ========== */
// app.jsx — main app controller + tweaks panel

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "startScreen": "splash",
  "accentHue": "gold",
  "viewMode": "list",
  "premium": false,
  "grain": true,
  "density": "regular"
}/*EDITMODE-END*/;

const HUE_MAP = {
  gold:    { accent: '#8B7355', light: '#C4A882', subtle: '#F0E8DC' },
  burgundy:{ accent: '#8B3A3A', light: '#C48282', subtle: '#F0DCDC' },
  sage:    { accent: '#4A7C59', light: '#82C498', subtle: '#DCF0E0' },
  ink:     { accent: '#2B3A55', light: '#7A8AAF', subtle: '#DCE3F0' },
  graphite:{ accent: '#3A3530', light: '#8A847D', subtle: '#E4DFD8' },
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Apply tweakable accent + grain
  React.useEffect(() => {
    const h = HUE_MAP[t.accentHue] || HUE_MAP.gold;
    const r = document.documentElement.style;
    r.setProperty('--accent', h.accent);
    r.setProperty('--accent-light', h.light);
    r.setProperty('--accent-subtle', h.subtle);
    r.setProperty('--camera-accent', h.light);
  }, [t.accentHue]);

  const [screen, setScreen] = React.useState(t.startScreen);
  React.useEffect(() => { setScreen(t.startScreen); }, [t.startScreen]);

  const [tab, setTab] = React.useState('home');
  const [viewMode, setViewMode] = React.useState(t.viewMode);
  React.useEffect(() => { setViewMode(t.viewMode); }, [t.viewMode]);

  const [isPremium, setPremium] = React.useState(t.premium);
  React.useEffect(() => { setPremium(t.premium); }, [t.premium]);

  const [scansUsed, setScansUsed] = React.useState(7);
  const [currentDoc, setCurrentDoc] = React.useState(null);
  const [toast, setToast] = React.useState(null);
  const [showSaveSheet, setShowSaveSheet] = React.useState(false);
  const [showLimitSheet, setShowLimitSheet] = React.useState(false);
  const [newPageCount, setNewPageCount] = React.useState(1);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2400);
  };

  const go = (s) => setScreen(s);

  const handleScan = () => {
    if (!isPremium && scansUsed >= 10) {
      setShowLimitSheet(true);
      return;
    }
    setNewPageCount(1);
    go('camera');
  };

  const onCapture = () => go('crop');
  const onCropApply = () => go('edit');
  const onEditSave = () => setShowSaveSheet(true);
  const onSaveConfirm = () => {
    setShowSaveSheet(false);
    setScansUsed(s => Math.min(s + newPageCount, 99));
    showToast('Документ сохранён в «Архив»');
    setTab('home');
    go('home');
  };

  // --- screen rendering ---
  let content;
  if (screen === 'splash') {
    content = <SplashScreen onDone={() => go('onboarding')}/>;
  } else if (screen === 'onboarding') {
    content = <OnboardingScreen onDone={() => go('permissions')}/>;
  } else if (screen === 'permissions') {
    content = <PermissionsScreen onDone={() => { setTab('home'); go('home'); }}/>;
  } else if (screen === 'home') {
    content = <HomeScreen
      onScan={handleScan}
      onOpenDoc={(d) => { setCurrentDoc(d); go('docview'); }}
      onTab={(k) => { setTab(k); if (k === 'settings') go('settings'); else go('home'); }}
      active={tab} viewMode={viewMode} setViewMode={setViewMode}
      onSettings={() => { setTab('settings'); go('settings'); }}
      isPremium={isPremium} scansUsed={scansUsed}
    />;
  } else if (screen === 'camera') {
    content = <CameraScreen
      onCapture={onCapture}
      onClose={() => go('home')}
      onGallery={() => go('crop')}
    />;
  } else if (screen === 'crop') {
    content = <CropScreen
      onApply={onCropApply}
      onRetake={() => go('camera')}
    />;
  } else if (screen === 'edit') {
    content = <EditScreen
      onSave={onEditSave}
      onAddPage={() => { setNewPageCount(n => n+1); go('camera'); }}
      pageCount={newPageCount}
    />;
  } else if (screen === 'docview') {
    content = <DocViewScreen
      doc={currentDoc}
      onBack={() => go('home')}
      onEdit={() => go('edit')}
      onShare={() => showToast('Открываю системное меню «Поделиться»')}
      onDelete={() => { showToast('Документ удалён'); go('home'); }}
    />;
  } else if (screen === 'settings') {
    content = <SettingsScreen
      onTab={(k) => { setTab(k); if (k === 'home') go('home'); else go('settings'); }}
      active={tab} onScan={handleScan}
      isPremium={isPremium} setPremium={(v) => { setPremium(v); setTweak('premium', v); }}
      scansUsed={scansUsed}
      onPaywall={() => go('paywall')}
    />;
  } else if (screen === 'paywall') {
    content = <PaywallScreen
      onClose={() => go('settings')}
      onPurchase={(plan) => {
        setPremium(true); setTweak('premium', true);
        showToast(plan === 'year' ? 'Премиум · годовой активирован' : 'Премиум · месячный активирован');
        go('settings');
      }}
    />;
  }

  return (
    <div className="stage">
      <Phone>
        {!t.grain && <style>{`.paper-grain { display: none !important; }`}</style>}
        <div key={screen} className="fade-in" style={{ position:'absolute', inset:0 }}>
          {content}
        </div>

        {showSaveSheet && <SaveSheet onClose={() => setShowSaveSheet(false)} onSave={onSaveConfirm}/>}
        {showLimitSheet && <LimitReachedSheet onClose={() => setShowLimitSheet(false)}
          onUpgrade={() => { setShowLimitSheet(false); go('paywall'); }}/>}
        {toast && <div className="toast">
          <IconCheck size={16} stroke="var(--accent-light)" strokeWidth={2.4}/>
          {toast}
        </div>}
      </Phone>

      <TweaksPanel>
        <TweakSection label="Flow"/>
        <TweakSelect label="Экран"
          value={screen}
          options={[
            {value:'splash', label:'Splash'},
            {value:'onboarding', label:'Onboarding'},
            {value:'permissions', label:'Разрешения'},
            {value:'home', label:'Главная'},
            {value:'camera', label:'Камера'},
            {value:'crop', label:'Обрезка'},
            {value:'edit', label:'Редактирование'},
            {value:'docview', label:'Просмотр документа'},
            {value:'settings', label:'Настройки'},
            {value:'paywall', label:'Paywall'},
          ]}
          onChange={(v) => { if (v === 'docview' && !currentDoc) setCurrentDoc(MOCK_DOCS[0]); setScreen(v); }}
        />
        <TweakSection label="Aesthetic"/>
        <TweakRadio label="Акцент"
          value={t.accentHue}
          options={['gold','burgundy','sage','ink','graphite']}
          onChange={(v) => setTweak('accentHue', v)}/>
        <TweakToggle label="Бумажная текстура"
          value={t.grain}
          onChange={(v) => setTweak('grain', v)}/>
        <TweakSection label="Content"/>
        <TweakRadio label="Вид списка"
          value={viewMode}
          options={['list','grid']}
          onChange={(v) => { setViewMode(v); setTweak('viewMode', v); }}/>
        <TweakToggle label="Премиум активен"
          value={isPremium}
          onChange={(v) => { setPremium(v); setTweak('premium', v); }}/>
        <TweakSlider label="Сканов сегодня"
          value={scansUsed} min={0} max={15} unit=" из 10"
          onChange={(v) => setScansUsed(v)}/>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);


</script>

</body>
</html>
